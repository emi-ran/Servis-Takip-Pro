<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bağlantı Hatası - Servis Takip</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #212529;
      --sub-color: #868e96;
      --primary-color: #228be6;
      --card-bg: #ffffff;
      --card-border: #dee2e6;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #101419;
        --text-color: #f8f9fa;
        --sub-color: #909296;
        --primary-color: #228be6;
        --card-bg: #1a1b1e;
        --card-border: #2c2e33;
      }
    }

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-color);
      box-sizing: border-box;
    }

    .container {
      max-width: 400px;
      width: 90%;
      text-align: center;
      padding: 40px 24px;
      background-color: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    .icon-container {
      width: 64px;
      height: 64px;
      background-color: rgba(34, 139, 230, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--primary-color);
    }

    h1 {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 14px;
      color: var(--sub-color);
      line-height: 1.5;
      margin: 0 0 24px;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid var(--card-border);
      border-radius: 50%;
      border-top-color: var(--primary-color);
      animation: spin 1s linear infinite;
      margin-top: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 16h.01"/>
        <path d="M12 8v5"/>
        <path d="M12 3a9 9 0 1 0 9 9 9 9 0 0 0-9-9Z"/>
      </svg>
    </div>
    <h1>Bağlantı Kurulamadı</h1>
    <p>Bağlantı hatası. Lütfen internetinizi kontrol edin veya birkaç dakika sonra tekrar deneyin. Otomatik olarak yeniden bağlanmaya çalışıyoruz...</p>
    <div class="spinner"></div>
  </div>

  <script>
    const TARGET_URL = 'http://localhost:3000';
    
    async function checkConnectionAndReload() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000);
        
        await fetch(TARGET_URL + '/api/setup', { 
          method: 'GET',
          mode: 'no-cors',
          signal: controller.signal,
          cache: 'no-store'
        });
        
        clearTimeout(timeoutId);
        window.location.replace(TARGET_URL);
      } catch (e) {
        setTimeout(checkConnectionAndReload, 3000);
      }
    }
    
    setTimeout(checkConnectionAndReload, 3000);
  </script>
</body>
</html>
